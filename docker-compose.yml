services:
  # ---- MySQL Database ----
  db:
    image: mysql:8.0
    container_name: drift_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: drift
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Go Backend ----
  backend:
    build: ./backend
    container_name: drift_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_HOST: db:3306
      DB_NAME: drift
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      PORT: 8080
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ---- Vue Frontend ----
  frontend:
    build: ./frontend
    container_name: drift_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
