services:
  # ---- MySQL Database (Docker) ----
  - type: pserv
    name: drift-db
    env: docker
    dockerContext: .
    dockerFilePath: db.Dockerfile
    plan: free
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: rootpassword
      - key: MYSQL_DATABASE
        value: drift

  # ---- Go Backend ----
  - type: web
    name: drift-backend
    env: go
    buildCommand: cd backend && go build -o server .
    startCommand: ./backend/server
    plan: free
    envVars:
      - key: DB_HOST
        value: drift-db:3306
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: rootpassword
      - key: DB_NAME
        value: drift
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000

  # ---- Vue Frontend ----
  - type: web
    name: drift-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: drift-backend
          type: web
          property: url
        suffix: /api
      - key: VITE_WS_URL
        fromService:
          name: drift-backend
          type: web
          property: url
        replace:
          - from: https://
            to: wss://
        suffix: /api/ws
